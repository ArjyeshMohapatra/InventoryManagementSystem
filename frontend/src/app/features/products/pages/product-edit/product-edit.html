<h1 class="text-2xl font-bold mb-6">
    Edit Product
</h1>

<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 bg-white p-6 rounded shadow">

    <!-- Name -->
    <div>

        <label class="block mb-1 font-medium">
            Product Name
        </label>

        <input type="text" formControlName="name" class="border p-2 w-full rounded">

    </div>

    <!-- Price -->
    <div>

        <label class="block mb-1 font-medium">
            Price
        </label>

        <input type="number" formControlName="price" class="border p-2 w-full rounded">

    </div>

    <!-- Quantity -->
    <div>

        <label class="block mb-1 font-medium">
            Quantity
        </label>

        <input type="number" formControlName="quantity" class="border p-2 w-full rounded">

    </div>

    <!-- Category -->
    <div>

        <label class="block mb-1 font-medium">
            Category
        </label>

        <input type="text" formControlName="category" class="border p-2 w-full rounded">

    </div>

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">

        Update Product

    </button>

    </form>
