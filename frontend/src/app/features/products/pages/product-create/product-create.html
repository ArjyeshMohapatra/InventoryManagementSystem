<h1 class="text-2xl font-bold mb-6">Add New Product</h1>

<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 bg-white p-6 rounded shadow">

    <div>
        <label class="block mb-1 font-medium text-gray-700">Product Name</label>
        <input type="text" formControlName="name" placeholder="e.g. Wireless Mouse" [readonly]="addMutation.isPending()"
            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
    </div>

    <div>
        <label class="block mb-1 font-medium text-gray-700">Price</label>
        <input type="number" formControlName="price" placeholder="0.00" [readonly]="addMutation.isPending()"
            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
    </div>

    <div>
        <label class="block mb-1 font-medium text-gray-700">Stock Quantity</label>
        <input type="number" formControlName="quantity" placeholder="0" [readonly]="addMutation.isPending()"
            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
    </div>

    <div>
        <label class="block mb-1 font-medium text-gray-700">Category</label>
        <input type="text" formControlName="category" placeholder="e.g. Electronics"
            [readonly]="addMutation.isPending()"
            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
    </div>

    <button type="submit" [disabled]="addMutation.isPending()"
        class="w-full sm:w-auto bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed font-medium transition-colors">
        @if (addMutation.isPending()) {
        Saving Product...
        } @else {
        Save Product
        }
    </button>

</form>
