<h1 class="text-2xl font-bold">Products</h1>
<div class="flex flex-col justify-between items-start md:flex-row md:items-center gap-4 mb-6">
    <app-search-input 
    [value]="searchInput()" 
    placeholder="Search products..." 
    (valueChanged)="searchInput.set($event)">
    </app-search-input>

    <app-select-input 
    [value]="selectedCategory()" 
    [options]="categories()" 
    (valueChanged)="selectedCategory.set($event)">
    </app-select-input>

    <button routerLink="/products/create" class="bg-green-600 text-white px-4 py-2 rounded">
        Add Product
    </button>
</div>

@if (prodStore.loading()) {
<p class="text-gray-500 animate-pulse">Loading products...</p>
}

@else if (prodStore.error()) {
<div class="p-4 bg-red-100 text-red-700 rounded">
    Failed to load products. Please try again later.
</div>
}

@else {
    <app-table [columns]="columns" [data]="filteredProducts()" [actions]="actions" [actionTemplate]="actionTemplate">
    
    <ng-template #actionTemplate let-row>
    
        <div class="flex gap-2">
    
            <button [routerLink]="['/products/edit', row.id]" class="bg-yellow-500 text-white px-2 py-1 rounded">
    
                Edit
    
            </button>
    
            <button (click)="openDeleteModal(row)" class="bg-red-500 text-white px-2 py-1 rounded">
    
                Delete
    
            </button>
    
        </div>
    
    </ng-template>
    </app-table>
}

<app-modal
  [open]="showDeleteModal()"
  title="Delete Product"
  message="Are you sure you want to delete this product?"
  (confirmed)="deleteProduct()"
  (cancelled)="closeDeleteModal()">
</app-modal>
