<div class="flex flex-col justify-between items-start md:flex-row md:items-center gap-4 mb-6">
    <h1 class="text-2xl font-bold">Products</h1>

    <button routerLink="/products/create" class="bg-green-600 text-white px-4 py-2 rounded">
        Add Product
    </button>
</div>

@if (productsQuery.isPending()) {
<p class="text-gray-500 animate-pulse">Loading products...</p>
}

@else if (productsQuery.error()) {
<div class="p-4 bg-red-100 text-red-700 rounded">
    Failed to load products. Please try again later.
</div>
}

@else {
<div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
    @for (product of productsQuery.data(); track product.id) {
    <app-product-card [product]="product"></app-product-card>
    } @empty {
    <p class="text-gray-500 col-span-full">No products found in the inventory.</p>
    }
</div> }
