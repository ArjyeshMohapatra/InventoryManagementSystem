<form [formGroup]="form()" (ngSubmit)="onSubmit()" class="space-y-4 bg-white p-6 rounded shadow">

    <div>
        <label class="block mb-1 font-medium">
            Product Name
        </label>

        <input type="text" formControlName="name" [readonly]="loading()" class="border p-2 w-full rounded">
    </div>

    <div>
        <label class="block mb-1 font-medium">
            Price
        </label>

        <input type="number" formControlName="price" [readonly]="loading()" class="border p-2 w-full rounded">
    </div>

    <div class="flex gap-3">
        <div>
            <label class="block mb-1 font-medium">Stock</label>
            @if (!isEditMode()) {
            <input type="number" formControlName="stock" [readonly]="loading()" class="border p-2 w-full rounded">
            } @else {
            <div class="flex items-center gap-3 flex-wrap">
                <span class="text-gray-700">Current Stock: {{ form().get('stock')?.value }}</span>
                <input #qty type="number" min="1" class="border p-2 rounded w-24" placeholder="Qty">
                <div class="flex gap-3 items-center flex-wrap">
                    <button type="button" class="bg-green-500 text-white px-3 py-1 rounded" (click)="addStock(+qty.value, qty)">
                        + Add
                    </button>
                    <button type="button" class="bg-red-500 text-white px-3 py-1 rounded"
                        (click)="removeStock(+qty.value, qty)">
                        - Remove
                    </button>
                </div>
        
            </div>
            }
        </div>
        <div>
            <label class="block mb-1 font-medium">Low Stock Threshold</label>
            <input type="number" min="0" formControlName="lowStockThreshold" [readonly]="loading()"
                class="border p-2 w-24 rounded">
            </div>
    </div>

    <div>
        <label class="block mb-1 font-medium">
            Category
        </label>

        <select formControlName="category" class="border p-2 w-full rounded">
            <option value="">Select Category</option>
        
            @for (category of categoryOptions(); track category.value) {
            <option [value]="category.value"> {{ category.label }} </option>
            }
        </select>
    </div>

    <div>
        <label class="block mb-1 font-medium">Supplier</label>
        <select formControlName="supplierId" class="border p-2 w-full rounded">
            <option value="">Select Supplier</option>
            @for (supplier of suppliers(); track supplier.id){
            <option [value]="supplier.id">{{supplier.name}}</option>
            }
        </select>
    </div>

    <button type="submit" [disabled]="loading()" class="bg-blue-500 text-white px-4 py-2 rounded disabled:bg-gray-400">

        {{ loading() ? 'Saving...' : buttonText() }}

    </button>

</form>

<app-modal [open]="showStockModal()" title="Stock Warning" [message]="stockMessage()" cancelText="Close"
    [showConfirm]="false" (cancelled)="closeStockModal()">
</app-modal>
