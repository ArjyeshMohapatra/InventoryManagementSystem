<div class="bg-white rounded shadow p-4">

    <h2 class="font-semibold text-lg">
        {{ product().name }}
    </h2>

    <p>
        ₹ {{ product().price }}
    </p>

    <p>
        Quantity: {{ product().quantity }}
    </p>

    <div class="flex flex-row gap-6">
        <button [routerLink]="['/products/edit', product().id]" class="bg-yellow-500 text-white px-3 py-1 rounded">
            Edit
        </button>
        
        <button (click)="openDeleteModal()" class="bg-red-500 text-white px-3 py-1 rounded">
            Delete
        </button>
    </div>

    <app-modal [open]="showDeleteModal()" title="Delete Product"
        message="Are you sure you want to delete this product? This action cannot be undone." (confirmed)="deleteProduct()"
        (cancelled)="closeDeleteModal()">
    </app-modal>
    

    </div>
