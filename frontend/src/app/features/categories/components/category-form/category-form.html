<form [formGroup]="form()" (ngSubmit)="onSubmit()" class="space-y-4 bg-white p-6 rounded shadow">
    <div>
        <label class="block mb-1 font-medium">Category Name</label>
        <input type="text" formControlName="name" class="border p-2 w-full rounded" />
    </div>
    <button type="submit" [disabled]="loading()" class="bg-blue-500 text-white px-4 py-2 rounded disabled:bg-gray-400">
        {{ loading() ? 'Saving...' : buttonText() }}
    </button>
</form>
