<div class="flex flex-col md:flex-row gap-4 mb-6">
    <app-search-input [value]="searchInput()" placeholder="Search categories..."
        (valueChanged)="searchInput.set($event)"></app-search-input>
    <button routerLink="/categories/create" class="bg-green-600 text-white px-4 py-2 rounded">Add Category</button>
</div>

@if (catStore.loading()) {
<p>Loading categories...</p>
} @else {
    <app-table [columns]="columns" [data]="filteredCategories()" [actions]="actions"
        [actionTemplate]="actionTemplate"></app-table>
    
    <ng-template #actionTemplate let-row>
        <div class="flex gap-2">
            <button [routerLink]="['/categories/edit', row.id]"
                class="bg-blue-200 text-blue-500 px-2 py-1 rounded">
                <fa-icon [icon]="edit"></fa-icon>
            </button>
            <button (click)="openDeleteModal(row)" class="bg-red-200 text-red-500 px-2 py-1 rounded">
                <fa-icon [icon]="remove"></fa-icon>
            </button>
        </div>
        </ng-template>
}
<app-modal [open]="showDeleteModal()" title="Delete Category" [message]=deleteMessage()
    (confirmed)="deleteCategory()" (cancelled)="closeDeleteModal()" [showConfirm]="true">
</app-modal>
