<div class="flex flex-col md:flex-row gap-4 mb-6">

    <app-search-input [value]="searchInput()" placeholder="Search suppliers..."
        (valueChanged)="searchInput.set($event)">
    </app-search-input>

    <button routerLink="/suppliers/create" class="bg-green-600 text-white px-4 py-2 rounded">

        Add Supplier

    </button>

</div>

<app-table [columns]="columns" [data]="filteredSuppliers()" [actions]="actions" [actionTemplate]="actionTemplate">
    <ng-template #actionTemplate let-row>
    
        <div class="flex gap-2">
    
            <button [routerLink]="['/suppliers/edit', row.id]" class="bg-blue-200 text-blue-500 px-2 py-1 rounded">
    
                <fa-icon [icon]="edit"></fa-icon>
    
            </button>
    
            <button (click)="openDeleteModal(row)" class="bg-red-200 text-red-500 px-2 py-1 rounded">
    
                <fa-icon [icon]="remove"></fa-icon>
    
            </button>
    
        </div>
    
        </ng-template>
</app-table>


<app-modal [open]="showDeleteModal()" title="Delete Supplier" [message]="deleteMessage()"
    (confirmed)="deleteSupplier()" (cancelled)="closeDeleteModal()" [showConfirm]="true">
</app-modal>
