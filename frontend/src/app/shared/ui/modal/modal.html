@if (open()){
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <h2 class="text-xl font-semibold mb-3">{{title()}}</h2>
            <p class="text-gray-600 mb-6">{{message()}}</p>
            <div class="flex justify-end gap-3">
                <button (click)="cancel()" class="px-4 py-2 rounded border border-gray-300">Cancel</button>
                <button (click)="confirm()" class="px-4 py-2 rounded border border-gray-300">Confirm</button>
            </div>
        </div>
    </div>
}
