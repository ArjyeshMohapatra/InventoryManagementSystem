@if (open()){
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-2xl relative">
            <button (click)="cancel()" class="absolute top-4 right-4 text-gray-500 hover:text-black">
            
                <fa-icon [icon]="close"></fa-icon>
            
            </button>
            <h2 class="text-xl font-semibold mb-3">{{title()}}</h2>
            @if (message()) {
            <p class="text-gray-600 mb-6">
                {{ message() }}
            </p>
            }
            
            <ng-content></ng-content>
            @if (showFooter()){
                <div class="flex justify-end gap-3">
                    <button (click)="cancel()" class="px-4 py-2 rounded border border-gray-300">{{ cancelText() }}</button>
                    @if (showConfirm()) {
                    <button (click)="confirm()" class="px-4 py-2 rounded border border-gray-300">{{ confirmText() }}</button>
                    }
                    </div>
            }
        </div>
    </div>
}
