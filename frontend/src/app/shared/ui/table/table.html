<div class="overflow-x-auto rounded-xl shadow border border-gray-200">
<table mat-table matSort [dataSource]="dataSource" class="w-full bg-white">
    @for (column of columns(); track column) {
    <ng-container [matColumnDef]="column">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="px-4 py-3 bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider border-b"> {{ column | titlecase }} </th>
        <td mat-cell *matCellDef="let row" class="px-4 py-4 whitespace-nowrap text-sm text-gray-700 border-b"> {{ row[column] }} </td>
    </ng-container>
    }
    @if (actions()) {
    
    <ng-container matColumnDef="actions">
    
        <th mat-header-cell *matHeaderCellDef class="px-4 py-3 bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider border-b">
    
            Actions
    
        </th>
    
        <td mat-cell *matCellDef="let row" class="px-4 py-4 whitespace-nowrap text-sm border-b">
            @if (actionTemplate(); as template) {
                <ng-container *ngTemplateOutlet="template; context: { $implicit: row }">
                </ng-container>
            }
        </td>
    
    </ng-container>
    }
    <tr mat-header-row *matHeaderRowDef="actions() ? [...columns(), 'actions'] : columns()"></tr>
    <tr mat-row *matRowDef="let row; columns: actions() ? [...columns(), 'actions'] : columns()"></tr>

    <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center p-3" [attr.colspan]="actions() ? columns().length + 1 : columns().length">
            No data to show
        </td>
    </tr>
</table>
<mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,20,30]" showFirstLastButtons>
</mat-paginator>
</div>
