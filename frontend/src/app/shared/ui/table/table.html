<div class="overflow-x-auto rounded-xl shadow border border-gray-400">
<table 
mat-table 
matSort 
[dataSource]="dataSource" 
cdkDropList
[cdkDropListData]="data()"
[cdkDropListDisabled]="!dragEnabled()"
(cdkDropListDropped)="drop($event)"
class="bg-white w-full"
style="table-layout: fixed; width: 100%;"
>
<colgroup>
    @for (column of columns(); track column) {
        <col [style.width.px]="getColumnWidth(column)">
    <ng-container [matColumnDef]="column">
        <th 
        mat-header-cell 
        *matHeaderCellDef 
        mat-sort-header
        [style.width.px]="columnWidths[column]"
        [style.min-width.px]="columnWidths[column]"
        [style.max-width.px]="columnWidths[column]"
        > {{ column | titlecase }} 
        </th>
        <td 
        mat-cell 
        *matCellDef="let row"
        [style.width.px]="columnWidths[column]"
        [style.min-width.px]="columnWidths[column]"
        [style.max-width.px]="columnWidths[column]"
        > {{ row[column] }} </td>
    </ng-container>
    }
</colgroup>

    @if (actions()) {
    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
            <div class="actions-container">
        
                @if (dragEnabled()) {
                <button type="button" cdkDragHandle class="drag-handle"><fa-icon [icon]="gripIcon"></fa-icon></button>
                }
        
                @if (actionTemplate(); as template) {
                <ng-container *ngTemplateOutlet="template; context: { $implicit: row }">
                </ng-container>
                }
        
            </div>   </td>
    
    </ng-container>
    }
    
    <tr mat-header-row *matHeaderRowDef="actions() ? [...columns(), 'actions'] : columns()"></tr>
    <tr mat-row *matRowDef="let row; columns: actions() ? [...columns(), 'actions'] : columns()"
        cdkDrag
        [cdkDragDisabled]="!dragEnabled()"
        [class.drag-source]="draggedRow() === row"
        [class.drag-target]="targetRow() === row"
        (cdkDragStarted)="draggedRow.set(row)"
        (cdkDragEntered)="targetRow.set(row)"
        (cdkDragEnded)="draggedRow.set(null); targetRow.set(null)"></tr>

    <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center p-3" [attr.colspan]="actions() ? columns().length + 1 : columns().length">
            No data to show
        </td>
    </tr>
</table>
<mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,20,30]" showFirstLastButtons>
</mat-paginator>
</div>
